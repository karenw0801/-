<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠遊戲 - 升級版</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: #FFF9E6; /* 米黃底 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            transition: background-color 0.2s;
        }

        body.flash-red {
            animation: flashBg 1s infinite;
        }

        @keyframes flashBg {
            0%, 100% { background-color: #FFF9E6; }
            50% { background-color: #ffb3b3; }
        }

        .game-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            width: 450px;
            border: 4px solid #8c7362; /* 手繪風格邊框 */
        }

        .game-container.shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        h1 {
            color: #d18b6a;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #6a4f3c;
            background: #fff0d4;
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid #e0c8aa;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-template-rows: repeat(3, 110px);
            gap: 20px;
            justify-content: center;
            margin: 0 auto;
        }

        .hole {
            background-image: repeating-radial-gradient(circle at center, #c18858 0, #c18858 6px, #b27a4a 7px, #b27a4a 12px);
            border: 4px solid #5c2e0b;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 10px 15px rgba(0,0,0,0.5), 0 5px 0 #8c5a38;
            cursor: crosshair;
        }

        .hole::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 40px;
            background-color: rgba(92, 46, 11, 0.8);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }

        .mole {
            font-size: 70px;
            position: absolute;
            bottom: -110px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            line-height: 1;
            cursor: pointer;
        }

        .mole.up {
            bottom: 5px;
        }

        .fly-off {
            position: absolute;
            font-size: 70px;
            line-height: 1;
            z-index: 20;
            pointer-events: none;
            animation: flyAway 0.6s cubic-bezier(.25,.8,.25,1) forwards;
        }

        @keyframes flyAway {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) translate(150px, -200px) rotate(720deg); opacity: 0; }
        }

        .particle {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            animation: popOut 0.5s ease-out forwards;
        }

        @keyframes popOut {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        button {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            background-color: #d18b6a;
            color: white;
            border: 3px solid #b37356;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b37356;
            transition: all 0.1s;
            font-family: inherit;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #b37356;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 249, 230, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            border-radius: 16px;
        }

        #game-over h2 {
            font-size: 45px;
            color: #d18b6a;
            margin: 0 0 15px 0;
        }

        #game-over p {
            font-size: 30px;
            font-weight: bold;
            color: #6a4f3c;
        }

        .hidden {
            display: none !important;
        }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 25;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
        }

        .combo-text {
            position: absolute;
            font-weight: bold;
            font-size: 36px;
            color: #FF9800;
            pointer-events: none;
            animation: comboPop 1s ease-out forwards;
            z-index: 26;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 0 10px #FF9800;
        }

        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(-5deg); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1) rotate(5deg); opacity: 0; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐹 打地鼠遊戲 🐹</h1>
        <div class="stats">
            <div class="score-board">分數: <span id="score">0</span></div>
            <div class="time-board">時間: <span id="time">30</span></div>
        </div>
        
        <div class="grid">
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
        </div>
        
        <button id="start-btn">開始遊戲</button>

        <div id="game-over" class="hidden">
            <h2>時間到！</h2>
            <p>最終分數: <span id="final-score">0</span></p>
            <button id="restart-btn">重新開始</button>
        </div>
    </div>

    <script>
        // --- Web Audio API 產生音效 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'whack') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                gainNode.gain.setValueAtTime(0.8, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'oops') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.3);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'tick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, now);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'combo') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.1);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.2);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        const holes = document.querySelectorAll('.hole');
        const scoreBoard = document.getElementById('score');
        const timeBoard = document.getElementById('time');
        const startBtn = document.getElementById('start-btn');
        const gameOverScreen = document.getElementById('game-over');
        const finalScore = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const gameContainer = document.querySelector('.game-container');

        let lastHole;
        let timeUp = false;
        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let gameTimer;
        let moleTimer;
        let isPlaying = false;

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = 1500;
            const hole = randomHole(holes);
            const mole = hole.querySelector('.mole');
            
            playSound('pop');
            mole.classList.add('up');
            mole.dataset.hittable = "true";
            
            moleTimer = setTimeout(() => {
                mole.classList.remove('up');
                mole.dataset.hittable = "false";
                combo = 0; // 沒打到就斷 combo
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            if (isPlaying) return;
            initAudio(); // 初始化音效
            
            isPlaying = true;
            scoreBoard.textContent = 0;
            timeBoard.textContent = 30;
            timeUp = false;
            score = 0;
            timeLeft = 30;
            combo = 0;
            document.body.classList.remove('flash-red');
            startBtn.style.display = 'none';
            gameOverScreen.classList.add('hidden');
            
            peep();
            
            gameTimer = setInterval(() => {
                timeLeft--;
                timeBoard.textContent = timeLeft;
                
                if (timeLeft <= 5 && timeLeft > 0) {
                    document.body.classList.add('flash-red');
                    playSound('tick');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(gameTimer);
                    clearTimeout(moleTimer);
                    timeUp = true;
                    isPlaying = false;
                    document.body.classList.remove('flash-red');
                    holes.forEach(hole => {
                        const m = hole.querySelector('.mole');
                        m.classList.remove('up');
                        m.dataset.hittable = "false";
                    });
                    showGameOver();
                }
            }, 1000);
        }

        function showGameOver() {
            finalScore.textContent = score;
            gameOverScreen.classList.remove('hidden');
            startBtn.style.display = 'inline-block';
        }

        function createParticles(x, y) {
            const colors = ['#FFD700', '#FF6347', '#32CD32', '#00BFFF', '#FF69B4'];
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 50;
                particle.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                
                gameContainer.appendChild(particle);
                setTimeout(() => particle.remove(), 500);
            }
        }

        function flyMole(x, y) {
            const flyEl = document.createElement('div');
            flyEl.textContent = '🐹';
            flyEl.className = 'fly-off';
            flyEl.style.left = `${x - 35}px`; 
            flyEl.style.top = `${y - 35}px`;
            
            gameContainer.appendChild(flyEl);
            setTimeout(() => flyEl.remove(), 600);
        }

        function showFloatingText(text, color, x, y) {
            const el = document.createElement('div');
            el.textContent = text;
            el.style.color = color;
            el.className = 'floating-text';
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 20}px`;
            gameContainer.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function showComboText(x, y) {
            const el = document.createElement('div');
            el.textContent = `COMBO x${combo}!`;
            el.className = 'combo-text';
            el.style.left = `${x}px`;
            el.style.top = `${y - 60}px`;
            gameContainer.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        holes.forEach(hole => {
            hole.addEventListener('mousedown', function(e) {
                if (!isPlaying || timeUp) return;
                
                const mole = this.querySelector('.mole');
                const containerRect = gameContainer.getBoundingClientRect();
                // 計算相對於容器的座標
                const rect = this.getBoundingClientRect();
                const x = rect.left + rect.width / 2 - containerRect.left;
                const y = rect.top + rect.height / 2 - containerRect.top;
                
                if (e.target.classList.contains('mole') && mole.dataset.hittable === "true") {
                    // 打中地鼠
                    playSound('whack');
                    score += 10;
                    combo++;
                    
                    mole.classList.remove('up');
                    mole.dataset.hittable = "false";
                    scoreBoard.textContent = score;
                    
                    showFloatingText('+10', '#4CAF50', x, y);
                    createParticles(x, y);
                    flyMole(x, y);
                    
                    if (combo >= 3) {
                        playSound('combo');
                        showComboText(x, y);
                    }
                    
                    clearTimeout(moleTimer);
                    setTimeout(peep, 200);
                } else if (!e.target.classList.contains('fly-off') && !e.target.classList.contains('particle') && !e.target.classList.contains('floating-text') && !e.target.classList.contains('combo-text')) {
                    // 打空 (防呆：不計算特效元素)
                    playSound('oops');
                    score -= 5;
                    combo = 0;
                    scoreBoard.textContent = score;
                    
                    gameContainer.classList.remove('shake');
                    void gameContainer.offsetWidth; // 觸發重繪
                    gameContainer.classList.add('shake');
                    
                    showFloatingText('-5', '#F44336', e.clientX - containerRect.left, e.clientY - containerRect.top);
                }
            });
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
