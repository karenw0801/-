<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星光勇者大冒險</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: #3b2f1e;
            background: #071c59;
            overflow: hidden;
        }

        .cover-screen {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: grid;
            place-items: center;
            background: #071c59;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .cover-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .cover-screen img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            display: block;
        }

        .cover-music-btn,
        .audio-unlock-btn {
            border: 0;
            border-radius: 999px;
            padding: 14px 22px;
            font: inherit;
            font-size: 20px;
            font-weight: 950;
            color: #4b2b08;
            background: linear-gradient(180deg, #fff7b8, #ffc85b);
            box-shadow: 0 6px 0 #bd7b20, 0 10px 18px rgba(0, 0, 0, 0.22);
            cursor: pointer;
        }

        .cover-music-btn {
            position: fixed;
            left: 50%;
            bottom: 30px;
            z-index: 52;
            transform: translateX(-50%);
        }

        .audio-unlock-btn {
            position: fixed;
            left: 50%;
            bottom: 22px;
            z-index: 16;
            display: none;
            transform: translateX(-50%);
        }

        .audio-unlock-btn.show {
            display: block;
        }

        .top-info {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 3px solid rgba(255, 217, 92, 0.95);
            border-radius: 18px;
            background: rgba(15, 25, 69, 0.72);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(6px);
        }

        .held-count {
            min-width: 98px;
            padding: 9px 12px;
            border-radius: 999px;
            background: #fff8d8;
            color: #693b10;
            font-size: 18px;
            font-weight: 950;
            text-align: center;
        }

        .clear-btn {
            border: 0;
            border-radius: 999px;
            padding: 10px 14px;
            font: inherit;
            font-size: 17px;
            font-weight: 950;
            color: #fff;
            background: #ef695b;
            box-shadow: 0 4px 0 #b83e35;
            cursor: pointer;
        }

        .clear-btn:active,
        .primary-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
        }

        .map-page {
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 40%, rgba(64, 139, 255, 0.2), transparent 44%),
                #071c59;
        }

        .map-container {
            position: relative;
            width: min(100vw, calc(100vh * 1672 / 941));
            height: min(100vh, calc(100vw * 941 / 1672));
        }

        .map-container img {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            display: block;
        }

        .hotspot {
            position: absolute;
            border-radius: 22px;
            border: 3px solid transparent;
            background: rgba(255, 255, 255, 0);
            cursor: pointer;
            transition: box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .hotspot:hover,
        .hotspot:focus-visible {
            outline: none;
            border-color: rgba(255, 242, 130, 0.72);
            background: rgba(255, 244, 136, 0.08);
            box-shadow: 0 0 24px 10px rgba(255, 235, 94, 0.55);
        }

        .hotspot.homophone {
            left: 1.2%;
            top: 4.2%;
            width: 24%;
            height: 17%;
        }

        .hotspot.phrase {
            left: 80.5%;
            top: 3.4%;
            width: 18.8%;
            height: 17.2%;
        }

        .hotspot.warrior {
            left: 1.2%;
            top: 72%;
            width: 18.4%;
            height: 17.8%;
        }

        .hotspot.gate {
            left: 38.5%;
            top: 70%;
            width: 22.7%;
            height: 19%;
        }

        .stamp {
            position: absolute;
            z-index: 4;
            display: none;
            width: 46px;
            height: 46px;
            place-items: center;
            border: 4px solid #ffffff;
            border-radius: 50%;
            color: #fff;
            background: #1daf54;
            box-shadow: 0 0 0 4px rgba(27, 132, 64, 0.45), 0 6px 12px rgba(0, 0, 0, 0.24);
            font-size: 29px;
            font-weight: 950;
        }

        .stamp.show {
            display: grid;
        }

        .stamp.homophone {
            left: 23%;
            top: 17.5%;
        }

        .stamp.phrase {
            left: 78.5%;
            top: 17.5%;
        }

        .stamp.warrior {
            left: 18.7%;
            top: 82.2%;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: rgba(7, 19, 54, 0.62);
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            position: relative;
            width: min(980px, 100%);
            max-height: min(92vh, 850px);
            overflow: auto;
            border: 6px solid #8b5b2a;
            border-radius: 24px;
            padding: 28px;
            background: #fff8dd;
            box-shadow: 0 24px 50px rgba(52, 32, 16, 0.35);
        }

        .close-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 46px;
            height: 46px;
            border: 0;
            border-radius: 50%;
            font: inherit;
            font-size: 26px;
            font-weight: 950;
            color: #fff;
            background: #d65349;
            cursor: pointer;
        }

        .modal-card h2 {
            margin: 0 50px 8px 0;
            font-size: clamp(34px, 5vw, 54px);
            color: #7c451b;
        }

        .modal-card p {
            margin: 0 0 18px;
            font-size: 22px;
            font-weight: 800;
        }

        .door {
            position: relative;
            width: min(270px, 70vw);
            height: 150px;
            margin: 8px auto 18px;
            border: 6px solid #7b4f25;
            border-bottom: 12px solid #7b4f25;
            border-radius: 22px 22px 8px 8px;
            background: linear-gradient(90deg, #ab6332 0 48%, #8f4e28 50% 100%);
            overflow: hidden;
        }

        .door::before,
        .door::after {
            content: "";
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(180deg, #c47a3d, #8b4b25);
            transition: transform 0.9s ease;
        }

        .door::before {
            left: 0;
            transform-origin: left center;
        }

        .door::after {
            right: 0;
            transform-origin: right center;
        }

        .door.open::before {
            transform: perspective(320px) rotateY(-72deg);
        }

        .door.open::after {
            transform: perspective(320px) rotateY(72deg);
        }

        .door-lock {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: grid;
            place-items: center;
            font-size: 58px;
            transition: opacity 0.35s ease;
        }

        .door.open .door-lock {
            opacity: 0;
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin: 18px 0 22px;
        }

        .slot {
            min-height: 142px;
            display: grid;
            place-items: center;
            gap: 8px;
            border: 4px dashed #b58a56;
            border-radius: 18px;
            padding: 14px;
            background: #fff1c3;
        }

        .slot.drag-over {
            background: #dff8ff;
            border-color: #4daee8;
        }

        .slot.correct {
            background: #d8f8d5;
            border-color: #39a94d;
            border-style: solid;
        }

        .slot.wrong {
            animation: wrongFlash 0.45s ease;
        }

        @keyframes wrongFlash {
            0%, 100% { background: #fff1c3; }
            50% { background: #ffd2d2; border-color: #e84747; }
        }

        .slot-label {
            font-size: 22px;
            font-weight: 950;
            color: #7c4a1d;
        }

        .slot-content {
            min-height: 56px;
            display: grid;
            place-items: center;
        }

        .check {
            display: none;
            font-size: 28px;
            color: #159447;
            font-weight: 950;
        }

        .correct .check {
            display: block;
        }

        .bag {
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border: 4px solid #d6a45d;
            border-radius: 20px;
            padding: 18px;
            background: #fffdfa;
        }

        .badge {
            touch-action: none;
            user-select: none;
            border: 4px solid #f1b936;
            border-radius: 18px;
            padding: 12px 16px;
            font-size: 22px;
            font-weight: 950;
            background: linear-gradient(180deg, #fff7b8, #ffd76e);
            box-shadow: 0 5px 0 #d39425;
            cursor: grab;
        }

        .badge:active {
            cursor: grabbing;
        }

        .badge.placed {
            cursor: default;
            box-shadow: none;
        }

        .empty-bag,
        .message {
            font-size: 20px;
            font-weight: 900;
            color: #7c4a1d;
        }

        .message {
            min-height: 30px;
            text-align: center;
            color: #d44c35;
        }

        .success-view {
            display: none;
            text-align: center;
        }

        .success-view.show {
            display: block;
        }

        .ending-view {
            display: none;
        }

        .ending-view.show {
            display: block;
        }

        .ending-frame {
            position: relative;
            overflow: hidden;
            min-height: min(70vh, 640px);
            border: 5px solid #f6c857;
            border-radius: 22px;
            background: #102457;
            box-shadow: inset 0 0 36px rgba(255, 231, 142, 0.25);
            cursor: pointer;
        }

        .ending-frame::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 42%, transparent 0 45%, rgba(255, 231, 142, 0.22) 72%, rgba(18, 26, 66, 0.5) 100%),
                linear-gradient(90deg, rgba(10, 16, 45, 0.32), transparent 18% 82%, rgba(10, 16, 45, 0.32));
            mix-blend-mode: screen;
        }

        .ending-image {
            width: 100%;
            min-height: min(70vh, 640px);
            object-fit: cover;
            display: block;
            filter: saturate(1.04);
            transform: scale(1.025);
            transition: opacity 0.72s ease, transform 1.35s ease, filter 0.72s ease;
            will-change: opacity, transform;
        }

        .ending-frame.is-entering .ending-image {
            animation: cinematicPush 5.8s ease-out forwards;
        }

        .ending-frame.is-fading .ending-image {
            opacity: 0;
            transform: scale(1.08);
            filter: saturate(0.86) brightness(0.82);
        }

        @keyframes cinematicPush {
            from {
                transform: scale(1.015);
            }
            to {
                transform: scale(1.075);
            }
        }

        .ending-copy {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 72px 26px 24px;
            color: #fffdf0;
            background: linear-gradient(180deg, transparent, rgba(12, 20, 54, 0.82) 36%, rgba(12, 20, 54, 0.94));
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.42);
            transition: opacity 0.55s ease, transform 0.55s ease;
        }

        .ending-frame.is-fading .ending-copy {
            opacity: 0;
            transform: translateY(14px);
        }

        .ending-title {
            margin: 0 0 8px;
            font-size: clamp(34px, 5vw, 58px);
            color: #ffe27b;
            letter-spacing: 0;
        }

        .ending-scene {
            margin: 0 0 10px;
            font-size: clamp(18px, 3vw, 25px);
            font-weight: 950;
        }

        .ending-text {
            max-width: 760px;
            margin: 0 auto;
            font-size: clamp(19px, 3vw, 28px);
            font-weight: 900;
            line-height: 1.55;
        }

        .ending-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 16px;
        }

        .ending-progress {
            font-size: 18px;
            font-weight: 950;
            color: #fff4bc;
        }

        .next-ending-btn {
            border: 0;
            border-radius: 999px;
            padding: 12px 22px;
            font: inherit;
            font-size: 20px;
            font-weight: 950;
            color: #51310c;
            background: linear-gradient(180deg, #fff6ad, #ffc85b);
            box-shadow: 0 5px 0 #bd7b20;
            cursor: pointer;
        }

        .next-ending-btn:disabled {
            opacity: 0.72;
            cursor: wait;
        }

        .music-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 3;
            border: 0;
            border-radius: 999px;
            padding: 10px 14px;
            font: inherit;
            font-size: 16px;
            font-weight: 950;
            color: #fff9d8;
            background: rgba(13, 23, 62, 0.68);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
            cursor: pointer;
        }

        .gate-game.hidden {
            display: none;
        }

        .cert-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 22px 0;
        }

        .primary-btn {
            border: 0;
            border-radius: 18px;
            padding: 18px 34px;
            font: inherit;
            font-size: 28px;
            font-weight: 950;
            color: #fff;
            background: linear-gradient(180deg, #ff9b43, #e36331);
            box-shadow: 0 8px 0 #a73b22;
            cursor: pointer;
        }

        .pointer-clone {
            position: fixed;
            z-index: 60;
            pointer-events: none;
            opacity: 0.92;
            transform: translate(-50%, -50%);
        }

        @media (max-width: 760px) {
            .top-info {
                left: 10px;
                right: 10px;
                justify-content: flex-end;
            }

            .held-count,
            .clear-btn {
                font-size: 15px;
            }

            .stamp {
                width: 34px;
                height: 34px;
                font-size: 22px;
                border-width: 3px;
            }

            .modal {
                padding: 12px;
            }

            .modal-card {
                padding: 22px 16px;
            }

            .slots {
                grid-template-columns: 1fr;
            }

            .ending-frame,
            .ending-image {
                min-height: 72vh;
            }

            .ending-copy {
                padding: 56px 16px 18px;
            }

            .music-btn {
                top: 10px;
                left: 10px;
                font-size: 14px;
            }

            .ending-controls {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="cover-screen" id="coverScreen" aria-label="星光勇者大冒險開場封面">
        <img src="map-bg.png" alt="星光勇者大冒險">
        <button class="cover-music-btn" id="coverMusicBtn" type="button">▶ 開啟音樂</button>
    </div>

    <button class="audio-unlock-btn" id="audioUnlockBtn" type="button">▶ 開啟背景音樂</button>

    <div class="top-info" aria-label="冒險狀態">
        <div class="held-count" id="heldCount">持有 0 / 3</div>
        <button class="clear-btn" id="clearBtn" type="button">🔄 清除進度</button>
    </div>

    <main class="map-page">
        <div class="map-container">
            <img src="cover.png" alt="大冒險地圖" id="mapImage">

            <button class="hotspot homophone" type="button" data-href="../示範1_同音異字配對/index.html" aria-label="同音異字配對"></button>
            <button class="hotspot phrase" type="button" data-href="../示範2_四字詞填字/index.html" aria-label="四字詞填字"></button>
            <button class="hotspot warrior" type="button" data-href="../示範3_打怪RPG/index.html" aria-label="打怪RPG"></button>
            <button class="hotspot gate" type="button" id="gateHotspot" aria-label="通關大門"></button>

            <div class="stamp homophone" id="stamp-homophone">✓</div>
            <div class="stamp phrase" id="stamp-phrase">✓</div>
            <div class="stamp warrior" id="stamp-warrior">✓</div>
        </div>
    </main>

    <div class="modal" id="gateModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-card">
            <button class="close-btn" id="closeModalBtn" type="button" aria-label="關閉">×</button>

            <section class="gate-game" id="gateGame">
                <h2 id="modalTitle">通關大門</h2>
                <p>把 3 個憑證放到正確的凹槽，就能打開大門！</p>

                <div class="door" id="door" aria-hidden="true">
                    <div class="door-lock">🔒</div>
                </div>

                <div class="slots" id="slots"></div>

                <h3>背包</h3>
                <div class="bag" id="bag"></div>
                <div class="message" id="message"></div>
            </section>

            <section class="ending-view" id="endingView" aria-label="星門初啟結局過場">
                <div class="ending-frame" id="endingFrame">
                    <button class="music-btn" id="musicBtn" type="button">♪ 結局音樂</button>
                    <img class="ending-image" id="endingImage" src="ending (1).png" alt="結局過場圖">
                    <div class="ending-copy">
                        <h2 class="ending-title">星門初啟</h2>
                        <div class="ending-scene" id="endingScene">三枚憑證發光</div>
                        <div class="ending-text" id="endingText">三個印記不是鑰匙，卻記得你走過的路。</div>
                        <div class="ending-controls">
                            <div class="ending-progress" id="endingProgress">1 / 4</div>
                            <button class="next-ending-btn" id="nextEndingBtn" type="button">下一頁</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="success-view" id="successView">
                <h2>🏆 冒險完成！</h2>
                <p>你完成了 3 個關卡！</p>
                <p id="totalTime">總冒險時長：0 分 00 秒</p>
                <p>已取得：</p>
                <div class="cert-list" id="successCerts"></div>
                <button class="primary-btn" id="restartAdventureBtn" type="button">再次冒險</button>
            </section>
        </div>
    </div>

    <script>
        const MUSIC = {
            start: new Audio("start music.mp3"),
            map: new Audio("map music.mp3"),
            ending: new Audio("ending music.mp3")
        };

        Object.values(MUSIC).forEach(audio => {
            audio.loop = true;
            audio.preload = "auto";
            audio.volume = 0.42;
        });

        const CERTS = [
            {
                id: "homophone",
                label: "同音之印",
                shortLabel: "同音",
                key: "cert_homophone",
                href: "../示範1_同音異字配對/index.html",
                icon: "🎴"
            },
            {
                id: "phrase",
                label: "四字詞之印",
                shortLabel: "四字詞",
                key: "cert_phrase",
                href: "../示範2_四字詞填字/index.html",
                icon: "📝"
            },
            {
                id: "warrior",
                label: "勇者之印",
                shortLabel: "勇者",
                key: "cert_warrior",
                href: "../示範3_打怪RPG/index.html",
                icon: "⚔️"
            }
        ];

        const DOOR_KEYS = ["adventure_door_slots", "adventure_complete"];
        const ENDING_SCENES = [
            {
                image: "ending (1).png",
                scene: "三枚憑證發光",
                text: "三個印記不是鑰匙，卻記得你走過的路。"
            },
            {
                image: "ending (2).png",
                scene: "大門打開",
                text: "門開了。原來冒險沒有被關在門裡，它一直藏在你願意再試一次的地方。"
            },
            {
                image: "ending (3).png",
                scene: "地圖回應",
                text: "咦？地圖好像還留了一頁空白。"
            },
            {
                image: "ending (4).png",
                scene: "星光落下",
                text: "今晚，你把三個關卡走成了一條路。明天，星光會記得你來過。"
            }
        ];
        const placed = {};
        let pointerDrag = null;
        let endingIndex = 0;
        let isEndingTransitioning = false;
        let currentMusic = null;
        let pendingMusic = null;

        function initAdventureStart() {
            if (!localStorage.getItem("adventure_start")) {
                localStorage.setItem("adventure_start", String(Date.now()));
            }
        }

        function initCover() {
            const cover = document.getElementById("coverScreen");
            if (sessionStorage.getItem("adventure_cover_seen")) {
                cover.classList.add("hide");
                playMusic("map");
                return;
            }

            playMusic("start");
            cover.addEventListener("click", () => {
                sessionStorage.setItem("adventure_cover_seen", "true");
                cover.classList.add("hide");
                playMusic("map");
            }, { once: true });
        }

        function playMusic(name) {
            const next = MUSIC[name];
            if (!next || currentMusic === next) {
                if (currentMusic && currentMusic.paused) currentMusic.play().catch(() => pendingMusic = name);
                return;
            }

            pendingMusic = name;
            Object.values(MUSIC).forEach(audio => {
                if (audio !== next) {
                    audio.pause();
                    audio.currentTime = 0;
                }
            });

            next.volume = name === "ending" ? 0.5 : 0.42;
            next.play()
                .then(() => {
                    currentMusic = next;
                    pendingMusic = null;
                    hideAudioUnlock();
                    updateMusicButton(name);
                })
                .catch(() => {
                    pendingMusic = name;
                    showAudioUnlock(name);
                    updateMusicButton(name, true);
                });
        }

        function showAudioUnlock(name) {
            const unlockBtn = document.getElementById("audioUnlockBtn");
            const coverBtn = document.getElementById("coverMusicBtn");
            if (name === "start" && coverBtn && !document.getElementById("coverScreen").classList.contains("hide")) {
                coverBtn.style.display = "block";
            }
            if (unlockBtn) {
                unlockBtn.textContent = name === "ending" ? "▶ 開啟結局音樂" : "▶ 開啟背景音樂";
                unlockBtn.classList.add("show");
            }
        }

        function hideAudioUnlock() {
            const unlockBtn = document.getElementById("audioUnlockBtn");
            const coverBtn = document.getElementById("coverMusicBtn");
            if (unlockBtn) unlockBtn.classList.remove("show");
            if (coverBtn) coverBtn.style.display = "none";
        }

        function updateMusicButton(name, blocked = false) {
            const musicBtn = document.getElementById("musicBtn");
            if (!musicBtn) return;
            if (name === "ending") {
                musicBtn.textContent = blocked ? "♪ 點我播放" : "♪ 結局音樂中";
            } else {
                musicBtn.textContent = "♪ 結局音樂";
            }
        }

        function unlockPendingMusic() {
            if (pendingMusic) playMusic(pendingMusic);
        }

        function stopAllMusic() {
            Object.values(MUSIC).forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
            currentMusic = null;
            pendingMusic = null;
            updateMusicButton("");
        }

        function hasCert(cert) {
            return localStorage.getItem(cert.key) !== null;
        }

        function renderProgress() {
            const count = CERTS.filter(hasCert).length;
            document.getElementById("heldCount").textContent = `持有 ${count} / 3`;

            CERTS.forEach(cert => {
                const stamp = document.getElementById(`stamp-${cert.id}`);
                stamp.classList.toggle("show", hasCert(cert));
            });
        }

        function openGate() {
            resetGateBoard();
            document.getElementById("gateModal").classList.add("show");
        }

        function closeGate() {
            document.getElementById("gateModal").classList.remove("show");
            clearPointerDrag();
            playMusic("map");
        }

        function resetGateBoard() {
            Object.keys(placed).forEach(key => delete placed[key]);
            document.getElementById("door").classList.remove("open");
            document.getElementById("gateGame").classList.remove("hidden");
            document.getElementById("endingView").classList.remove("show");
            document.getElementById("successView").classList.remove("show");
            document.getElementById("message").textContent = "";
            renderSlots();
            renderBag();
        }

        function renderSlots() {
            const slots = document.getElementById("slots");
            slots.innerHTML = "";

            CERTS.forEach(cert => {
                const slot = document.createElement("div");
                slot.className = "slot";
                slot.dataset.certId = cert.id;
                slot.innerHTML = `
                    <div class="slot-label">${cert.shortLabel}</div>
                    <div class="slot-content">凹槽</div>
                    <div class="check">✓</div>
                `;

                slot.addEventListener("dragover", event => {
                    event.preventDefault();
                    slot.classList.add("drag-over");
                });
                slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
                slot.addEventListener("drop", event => {
                    event.preventDefault();
                    slot.classList.remove("drag-over");
                    handleBadgeDrop(event.dataTransfer.getData("text/plain"), slot);
                });

                slots.appendChild(slot);
            });
        }

        function renderBag() {
            const bag = document.getElementById("bag");
            bag.innerHTML = "";

            const owned = CERTS.filter(cert => hasCert(cert) && !placed[cert.id]);
            if (owned.length === 0) {
                bag.innerHTML = `<div class="empty-bag">${CERTS.some(hasCert) ? "已取得的憑證都放進凹槽了！" : "你還沒有憑證，先去完成關卡吧！"}</div>`;
                return;
            }

            owned.forEach(cert => bag.appendChild(createBadge(cert)));
        }

        function createBadge(cert) {
            const badge = document.createElement("div");
            badge.className = "badge";
            badge.draggable = true;
            badge.dataset.certId = cert.id;
            badge.textContent = `${cert.icon} ${cert.label}`;

            badge.addEventListener("dragstart", event => {
                event.dataTransfer.setData("text/plain", cert.id);
                event.dataTransfer.effectAllowed = "move";
            });

            badge.addEventListener("pointerdown", event => startPointerDrag(event, cert, badge));
            return badge;
        }

        function handleBadgeDrop(certId, slot) {
            const cert = CERTS.find(item => item.id === certId);
            if (!cert || !hasCert(cert) || placed[cert.id]) return;

            const message = document.getElementById("message");
            if (slot.dataset.certId !== cert.id) {
                slot.classList.add("wrong");
                message.textContent = "這個憑證不是放這裡喔！";
                setTimeout(() => slot.classList.remove("wrong"), 500);
                return;
            }

            placed[cert.id] = true;
            slot.classList.add("correct");
            slot.querySelector(".slot-content").innerHTML = `<span class="badge placed">${cert.icon} ${cert.label}</span>`;
            message.textContent = "";
            renderBag();
            checkGateComplete();
        }

        function startPointerDrag(event, cert, source) {
            if (event.pointerType === "mouse") return;
            event.preventDefault();
            source.setPointerCapture(event.pointerId);

            const clone = source.cloneNode(true);
            clone.classList.add("pointer-clone");
            clone.style.left = `${event.clientX}px`;
            clone.style.top = `${event.clientY}px`;
            document.body.appendChild(clone);
            pointerDrag = { cert, clone, source, pointerId: event.pointerId };

            source.addEventListener("pointermove", movePointerDrag);
            source.addEventListener("pointerup", finishPointerDrag);
            source.addEventListener("pointercancel", cancelPointerDrag);
        }

        function movePointerDrag(event) {
            if (!pointerDrag || event.pointerId !== pointerDrag.pointerId) return;
            pointerDrag.clone.style.left = `${event.clientX}px`;
            pointerDrag.clone.style.top = `${event.clientY}px`;

            document.querySelectorAll(".slot").forEach(slot => slot.classList.remove("drag-over"));
            const target = document.elementFromPoint(event.clientX, event.clientY);
            const slot = target ? target.closest(".slot") : null;
            if (slot) slot.classList.add("drag-over");
        }

        function finishPointerDrag(event) {
            if (!pointerDrag || event.pointerId !== pointerDrag.pointerId) return;
            const target = document.elementFromPoint(event.clientX, event.clientY);
            const slot = target ? target.closest(".slot") : null;
            if (slot) handleBadgeDrop(pointerDrag.cert.id, slot);
            clearPointerDrag();
        }

        function cancelPointerDrag() {
            clearPointerDrag();
        }

        function clearPointerDrag() {
            document.querySelectorAll(".slot").forEach(slot => slot.classList.remove("drag-over"));
            if (!pointerDrag) return;
            pointerDrag.source.removeEventListener("pointermove", movePointerDrag);
            pointerDrag.source.removeEventListener("pointerup", finishPointerDrag);
            pointerDrag.source.removeEventListener("pointercancel", cancelPointerDrag);
            pointerDrag.clone.remove();
            pointerDrag = null;
        }

        function checkGateComplete() {
            if (!CERTS.every(cert => placed[cert.id])) return;
            localStorage.setItem("adventure_complete", "true");
            document.getElementById("door").classList.add("open");
            setTimeout(showEndingStory, 950);
        }

        function showEndingStory() {
            endingIndex = 0;
            document.getElementById("gateGame").classList.add("hidden");
            document.getElementById("endingView").classList.add("show");
            renderEndingScene();
            playMusic("ending");
        }

        function renderEndingScene() {
            const scene = ENDING_SCENES[endingIndex];
            const frame = document.getElementById("endingFrame");
            const image = document.getElementById("endingImage");
            frame.classList.remove("is-entering");
            void frame.offsetWidth;
            image.src = scene.image;
            image.alt = `星門初啟：${scene.scene}`;
            document.getElementById("endingScene").textContent = scene.scene;
            document.getElementById("endingText").textContent = scene.text;
            document.getElementById("endingProgress").textContent = `${endingIndex + 1} / ${ENDING_SCENES.length}`;
            document.getElementById("nextEndingBtn").textContent = endingIndex === ENDING_SCENES.length - 1 ? "冒險完成" : "下一頁";
            frame.classList.add("is-entering");
        }

        function advanceEnding() {
            if (isEndingTransitioning) return;
            playMusic("ending");

            if (endingIndex >= ENDING_SCENES.length - 1) {
                isEndingTransitioning = true;
                document.getElementById("nextEndingBtn").disabled = true;
                document.getElementById("endingFrame").classList.add("is-fading");
                setTimeout(() => {
                    document.getElementById("endingView").classList.remove("show");
                    document.getElementById("endingFrame").classList.remove("is-fading", "is-entering");
                    document.getElementById("nextEndingBtn").disabled = false;
                    isEndingTransitioning = false;
                    showSuccess();
                }, 760);
                return;
            }

            isEndingTransitioning = true;
            document.getElementById("nextEndingBtn").disabled = true;
            document.getElementById("endingFrame").classList.add("is-fading");
            setTimeout(() => {
                endingIndex++;
                renderEndingScene();
                document.getElementById("endingFrame").classList.remove("is-fading");
                document.getElementById("nextEndingBtn").disabled = false;
                isEndingTransitioning = false;
            }, 760);
        }

        function startVictoryMusic() {
            playMusic("ending");
        }

        function stopVictoryMusic() {
            stopAllMusic();
        }

        function showSuccess() {
            document.getElementById("gateGame").classList.add("hidden");
            document.getElementById("successView").classList.add("show");
            document.getElementById("totalTime").textContent = `總冒險時長：${formatAdventureTime()}`;

            const list = document.getElementById("successCerts");
            list.innerHTML = "";
            CERTS.forEach(cert => {
                const badge = document.createElement("div");
                badge.className = "badge placed";
                badge.textContent = `${cert.icon} ${cert.label}`;
                list.appendChild(badge);
            });
        }

        function formatAdventureTime() {
            const start = Number(localStorage.getItem("adventure_start")) || Date.now();
            const elapsed = Math.max(0, Math.floor((Date.now() - start) / 1000));
            const minutes = Math.floor(elapsed / 60);
            const seconds = String(elapsed % 60).padStart(2, "0");
            return `${minutes} 分 ${seconds} 秒`;
        }

        function clearProgress() {
            CERTS.forEach(cert => localStorage.removeItem(cert.key));
            localStorage.removeItem("adventure_start");
            sessionStorage.removeItem("adventure_cover_seen");
            DOOR_KEYS.forEach(key => localStorage.removeItem(key));
            Object.keys(placed).forEach(key => delete placed[key]);
            stopAllMusic();
            location.reload();
        }

        document.querySelectorAll(".hotspot[data-href]").forEach(button => {
            button.addEventListener("click", () => {
                window.location.href = button.dataset.href;
            });
        });
        document.getElementById("gateHotspot").addEventListener("click", openGate);
        document.getElementById("clearBtn").addEventListener("click", clearProgress);
        document.getElementById("closeModalBtn").addEventListener("click", closeGate);
        document.getElementById("restartAdventureBtn").addEventListener("click", clearProgress);
        document.getElementById("endingFrame").addEventListener("click", advanceEnding);
        document.getElementById("nextEndingBtn").addEventListener("click", event => {
            event.stopPropagation();
            advanceEnding();
        });
        document.getElementById("musicBtn").addEventListener("click", event => {
            event.stopPropagation();
            playMusic("ending");
        });
        document.getElementById("coverMusicBtn").addEventListener("click", event => {
            event.stopPropagation();
            playMusic("start");
        });
        document.getElementById("audioUnlockBtn").addEventListener("click", event => {
            event.stopPropagation();
            unlockPendingMusic();
        });
        document.getElementById("gateModal").addEventListener("click", event => {
            if (event.target.id === "gateModal") closeGate();
        });
        document.addEventListener("pointerdown", unlockPendingMusic);
        document.addEventListener("keydown", unlockPendingMusic);

        initAdventureStart();
        initCover();
        renderProgress();
    </script>
</body>
</html>
