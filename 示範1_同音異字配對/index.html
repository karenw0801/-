<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同音異字配對遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f8ff; /* 淺藍色背景 */
            --slot-border: #87ceeb;
            --slot-bg: #ffffff;
            --card-bg: #fff9c4;
            --card-border: #ffd700;
            --correct-bg: #e8f5e9;
            --correct-border: #4caf50;
            --error-bg: #ffebee;
            --error-border: #ef5350;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: #333;
        }

        .map-back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            padding: 10px 18px;
            border-radius: 999px;
            background: #ffffff;
            color: #1976d2;
            border: 3px solid #64b5f6;
            box-shadow: 0 4px 0 #90caf9;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #1976d2;
            font-size: 36px;
            margin: 0 0 15px 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 20px;
            font-weight: bold;
            background: #fff;
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: inline-flex;
            border: 2px solid #b3e5fc;
            flex-wrap: wrap;
        }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .left-panel {
            flex: 1.2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .right-panel {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 15px;
            border: 2px dashed #b0bec5;
            align-content: start;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* 滾動條美化 */
        .right-panel::-webkit-scrollbar {
            width: 8px;
        }
        .right-panel::-webkit-scrollbar-thumb {
            background: #b0bec5;
            border-radius: 4px;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .left-panel {
                grid-template-columns: repeat(4, 1fr);
            }
            .right-panel {
                max-height: 50vh;
            }
        }

        @media (max-width: 600px) {
            .left-panel {
                grid-template-columns: repeat(2, 1fr);
            }
            .right-panel {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
        }

        .slot {
            background: var(--slot-bg);
            border: 4px solid var(--slot-border);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .slot.shake {
            animation: shake 0.3s;
        }

        .slot .zhuyin-header {
            font-size: 40px;
            font-weight: bold;
            color: #0277bd;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 4px;
            margin-bottom: 15px;
            margin-top: 10px;
            height: 140px;
            display: flex;
            align-items: center;
        }

        .drop-zone {
            width: 100%;
            min-height: 130px;
            background: #f5f5f5;
            border: 2px dashed #bdbdbd;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
            box-sizing: border-box;
            transition: background 0.2s, border-color 0.2s;
        }

        .drop-zone.drag-over {
            background: #e1f5fe;
            border-color: #29b6f6;
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            border-radius: 12px;
            padding: 12px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
            transition: transform 0.1s, background 0.2s;
        }

        .card * {
            pointer-events: none; /* 避免干擾拖曳 */
        }

        .card:active {
            cursor: grabbing;
        }

        .card.dragging {
            opacity: 0.6;
            transform: scale(1.05);
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .card-icon {
            font-size: 32px;
        }

        .card-word {
            font-size: 48px;
            font-weight: bold;
            color: #333;
        }

        .card-zhuyin {
            font-size: 20px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: #666;
            letter-spacing: 2px;
        }

        .card-example {
            font-size: 16px;
            color: #555;
            text-align: center;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            width: 90%;
        }

        .card.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            cursor: default;
            box-shadow: none;
            padding: 8px 5px;
            pointer-events: none; /* 放置後不再干擾拖放 */
        }

        .card.correct .card-top {
            margin-bottom: 0;
            gap: 5px;
        }

        .card.correct .card-icon {
            font-size: 20px;
        }

        .card.correct .card-word {
            font-size: 32px;
            color: #2e7d32;
        }

        .card.correct .card-zhuyin {
            font-size: 16px;
            letter-spacing: 0px;
        }

        .card.correct .card-example {
            display: none; /* 在讀音槽內隱藏例句以節省空間 */
        }

        .card.error {
            animation: errorFlash 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
        }

        @keyframes errorFlash {
            0%, 100% { background: var(--card-bg); border-color: var(--card-border); }
            50% { background: var(--error-bg); border-color: var(--error-border); }
        }

        /* Toast 提示 */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            top: 50px;
        }

        #toast.success { background: #4caf50; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4); }
        #toast.error { background: #ef5350; box-shadow: 0 4px 15px rgba(239, 83, 80, 0.4); }

        /* 過關畫面 */
        #win-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #win-screen h2 {
            font-size: 56px;
            color: #ff9800;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.1);
        }

        #win-screen p {
            font-size: 32px;
            color: #333;
            margin: 10px 0;
            font-weight: bold;
        }

        .btn-restart {
            margin-top: 40px;
            padding: 15px 45px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            background: #ff9800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #f57c00;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: inherit;
        }

        .btn-restart:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #f57c00;
        }

        .hidden { display: none !important; }
        
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            opacity: 0.8;
            z-index: 1999;
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>
    <a class="map-back-btn" href="../大冒險地圖/index.html">← 回到大地圖</a>
    <div id="toast"></div>

    <div class="header">
        <h1>同音異字配對遊戲 🎓</h1>
        <div class="stats-bar">
            <span>分數: <span id="score" style="color:#1976d2;">0</span></span>
            <span>嘗試次數: <span id="attempts" style="color:#ff9800;">0</span></span>
            <span>進度: <span id="progress" style="color:#4caf50;">0</span> / 16</span>
            <button onclick="initGame()" style="margin-left: 20px; padding: 8px 20px; border-radius: 20px; border: none; background: #64b5f6; color: white; font-size: 18px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 4px 0 #42a5f5;">重新洗牌</button>
        </div>
    </div>

    <div class="main-container">
        <div class="left-panel" id="slots-container">
            <!-- Slots generated by JS -->
        </div>
        <div class="right-panel" id="cards-container">
            <!-- Cards generated by JS -->
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <h2>太棒了！✨</h2>
        <p>你完成了同音異字配對！</p>
        <p>總共嘗試次數：<span id="final-attempts" style="color:#ff9800;">0</span></p>
        <p>最終分數：<span id="final-score" style="color:#1976d2;">0</span></p>
        <button class="btn-restart" onclick="initGame()">再玩一次</button>
    </div>

    <script>
        const sounds = [
            { id: 1, zhuyin: "ㄗㄞˋ" },
            { id: 2, zhuyin: "ㄗㄨㄛˋ" },
            { id: 3, zhuyin: "ㄉㄜ˙" },
            { id: 4, zhuyin: "ㄉㄠˋ" },
            { id: 5, zhuyin: "ㄧㄡˇ" },
            { id: 6, zhuyin: "ㄕˋ" },
            { id: 7, zhuyin: "ㄧㄡˋ" },
            { id: 8, zhuyin: "ㄒㄧㄤˋ" }
        ];

        const originalWords = [
            { id: "w1", sound_id: 1, word: "在", zhuyin: "ㄗㄞˋ", example: "我在教室裡。", icon: "🏫" },
            { id: "w2", sound_id: 1, word: "再", zhuyin: "ㄗㄞˋ", example: "請你再說一次。", icon: "🔁" },
            { id: "w3", sound_id: 2, word: "坐", zhuyin: "ㄗㄨㄛˋ", example: "請你坐下。", icon: "🪑" },
            { id: "w4", sound_id: 2, word: "做", zhuyin: "ㄗㄨㄛˋ", example: "我做功課。", icon: "✏️" },
            { id: "w5", sound_id: 3, word: "的", zhuyin: "ㄉㄜ˙", example: "這是我的書。", icon: "📘" },
            { id: "w6", sound_id: 3, word: "得", zhuyin: "ㄉㄜ˙", example: "他跑得很快。", icon: "🏃" },
            { id: "w7", sound_id: 4, word: "到", zhuyin: "ㄉㄠˋ", example: "我到學校了。", icon: "🎒" },
            { id: "w8", sound_id: 4, word: "道", zhuyin: "ㄉㄠˋ", example: "這是一條道路。", icon: "🛣️" },
            { id: "w9", sound_id: 5, word: "有", zhuyin: "ㄧㄡˇ", example: "我有一枝筆。", icon: "✏️" },
            { id: "w10", sound_id: 5, word: "友", zhuyin: "ㄧㄡˇ", example: "他是我的朋友。", icon: "👫" },
            { id: "w11", sound_id: 6, word: "是", zhuyin: "ㄕˋ", example: "我是學生。", icon: "🙋" },
            { id: "w12", sound_id: 6, word: "事", zhuyin: "ㄕˋ", example: "我有一件事。", icon: "📝" },
            { id: "w13", sound_id: 7, word: "又", zhuyin: "ㄧㄡˋ", example: "他又笑了。", icon: "😊" },
            { id: "w14", sound_id: 7, word: "右", zhuyin: "ㄧㄡˋ", example: "請向右走。", icon: "➡️" },
            { id: "w15", sound_id: 8, word: "像", zhuyin: "ㄒㄧㄤˋ", example: "他像爸爸。", icon: "👨👧" },
            { id: "w16", sound_id: 8, word: "象", zhuyin: "ㄒㄧㄤˋ", example: "大象很大。", icon: "🐘" }
        ];

        let score = 0;
        let attempts = 0;
        let matchedCount = 0;
        let draggedCard = null;

        const slotsContainer = document.getElementById('slots-container');
        const cardsContainer = document.getElementById('cards-container');
        const scoreEl = document.getElementById('score');
        const attemptsEl = document.getElementById('attempts');
        const progressEl = document.getElementById('progress');
        const toastEl = document.getElementById('toast');
        const winScreen = document.getElementById('win-screen');

        function shuffle(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function initGame() {
            score = 0;
            attempts = 0;
            matchedCount = 0;
            updateStats();
            winScreen.classList.add('hidden');
            
            slotsContainer.innerHTML = '';
            cardsContainer.innerHTML = '';

            // 建立左欄注音槽
            sounds.forEach(sound => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.soundId = sound.id;
                
                slot.innerHTML = `
                    <div class="zhuyin-header">${sound.zhuyin}</div>
                    <div class="drop-zone"></div>
                `;
                
                const dropZone = slot.querySelector('.drop-zone');
                
                dropZone.addEventListener('dragover', e => {
                    e.preventDefault();
                    // 只有當裡面卡片小於2張時才顯示可放置的樣式
                    if (dropZone.children.length < 2) {
                        dropZone.classList.add('drag-over');
                    }
                });
                
                dropZone.addEventListener('dragleave', e => {
                    dropZone.classList.remove('drag-over');
                });
                
                dropZone.addEventListener('drop', handleDrop);
                
                slotsContainer.appendChild(slot);
            });

            // 建立隨機同音異字卡
            const shuffledWords = shuffle(originalWords);
            shuffledWords.forEach(w => {
                const card = document.createElement('div');
                card.className = 'card';
                card.draggable = true;
                card.dataset.id = w.id;
                card.dataset.soundId = w.sound_id;
                
                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-icon">${w.icon}</div>
                        <div class="card-word">${w.word}</div>
                        <div class="card-zhuyin">${w.zhuyin}</div>
                    </div>
                    <div class="card-example">${w.example}</div>
                `;
                
                card.addEventListener('dragstart', function(e) {
                    if (this.classList.contains('correct')) return;
                    draggedCard = this;
                    e.dataTransfer.setData('text/plain', this.dataset.id);
                    setTimeout(() => this.classList.add('dragging'), 0);
                });
                
                card.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    draggedCard = null;
                });
                
                cardsContainer.appendChild(card);
            });
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            
            if (!draggedCard) return;
            
            // 確保目標是 drop-zone
            const dropZone = this;
            if (dropZone.children.length >= 2) {
                // 容量已滿
                showToast('這裡已經滿了喔！', 'error');
                return;
            }

            const slot = dropZone.closest('.slot');
            const soundId = slot.dataset.soundId;

            attempts++;
            
            if (draggedCard.dataset.soundId === soundId) {
                // 配對正確
                score += 10;
                matchedCount++;
                draggedCard.classList.add('correct');
                draggedCard.draggable = false;
                
                dropZone.appendChild(draggedCard);
                
                showToast('答對了！⭐️', 'success');
                createStar(e.clientX, e.clientY);
                updateStats();

                if (matchedCount === originalWords.length) {
                    setTimeout(showWinScreen, 600);
                }
            } else {
                // 配對錯誤
                draggedCard.classList.add('error');
                slot.classList.add('shake');
                showToast('再想想，看看注音喔！', 'error');
                updateStats();
                
                const cardRef = draggedCard;
                setTimeout(() => {
                    cardRef.classList.remove('error');
                    slot.classList.remove('shake');
                }, 400);
            }
        }

        function updateStats() {
            scoreEl.textContent = score;
            attemptsEl.textContent = attempts;
            progressEl.textContent = matchedCount;
        }

        let toastTimeout;
        function showToast(msg, type) {
            toastEl.textContent = msg;
            toastEl.className = type;
            toastEl.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 1500);
        }

        function createStar(x, y) {
            const star = document.createElement('div');
            star.textContent = '⭐';
            star.style.position = 'fixed';
            star.style.left = (x - 20) + 'px';
            star.style.top = (y - 20) + 'px';
            star.style.fontSize = '40px';
            star.style.zIndex = '1500';
            star.style.pointerEvents = 'none';
            star.style.transition = 'all 0.8s ease-out';
            document.body.appendChild(star);
            
            // 下一幀執行特效
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    star.style.transform = 'translateY(-80px) scale(1.5) rotate(180deg)';
                    star.style.opacity = '0';
                });
            });
            
            setTimeout(() => star.remove(), 800);
        }

        function showWinScreen() {
            localStorage.setItem('cert_homophone', 'true');
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-attempts').textContent = attempts;
            winScreen.classList.remove('hidden');
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];
            
            for (let i = 0; i < 120; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = -20 + 'px';
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // 隨機形狀
                if (Math.random() > 0.5) conf.style.borderRadius = '50%';
                
                winScreen.appendChild(conf);
                
                setTimeout(() => conf.remove(), 5000);
            }
        }

        // 初始化遊戲
        window.onload = initGame;
    </script>
</body>
</html>
