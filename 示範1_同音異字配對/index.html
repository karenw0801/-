<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國文同音異字練習 🌟</title>
    <style>
        :root {
            --bg-color: #FFF9E6; /* 淡黃色背景 */
            --primary-color: #4CAF50; /* 溫和的綠色 */
            --primary-light: #E8F5E9;
            --secondary-color: #FF9800; /* 溫暖的橘色 */
            --text-main: #333333;
            --text-light: #666666;
            --card-bg: #FFFFFF;
            --error-color: #FF5252;
            --border-radius: 16px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --drop-bg: #F0F4F8; /* 淡藍色空位 */
        }

        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .map-back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 500;
            padding: 10px 18px;
            border-radius: 999px;
            background: #ffffff;
            color: var(--secondary-color);
            border: 3px solid #ffb74d;
            box-shadow: 0 4px 0 #ffcc80;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
        }

        header {
            background-color: var(--card-bg);
            padding: 15px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: var(--primary-light);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--primary-color);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* 左側句子區 */
        .sentences-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .sentence-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s;
        }

        .sentence-card:hover {
            transform: translateY(-2px);
        }

        .sentence-content {
            font-size: 24px;
            line-height: 1.6;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sentence-icon {
            font-size: 28px;
            margin-right: 8px;
        }

        .drop-zone {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            border: 3px dashed #B0BEC5;
            border-radius: 12px;
            background-color: var(--drop-bg);
            vertical-align: middle;
            margin: 0 5px;
            transition: all 0.3s;
            cursor: pointer; /* 給點選模式用的提示 */
        }

        .drop-zone.drag-over {
            border-color: var(--secondary-color);
            background-color: #FFF3E0;
            transform: scale(1.05);
        }

        .drop-zone.filled {
            border: 3px solid var(--primary-color);
            background-color: var(--primary-light);
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            cursor: default;
        }

        .drop-zone.error-flash {
            animation: shake 0.4s ease-in-out;
            border-color: var(--error-color);
            background-color: #FFEBEE;
        }

        .sentence-hint {
            font-size: 16px;
            color: var(--text-light);
            background-color: #F5F5F5;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            align-self: flex-start;
        }

        .sentence-feedback {
            font-size: 16px;
            font-weight: bold;
            height: 24px; /* 保留空間 */
        }
        .feedback-success { color: var(--primary-color); }
        .feedback-error { color: var(--error-color); }

        /* 右側字卡區 */
        .words-area {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 90px;
            height: calc(100vh - 130px);
        }

        .words-area h2 {
            margin-top: 0;
            color: var(--secondary-color);
            text-align: center;
            border-bottom: 2px dashed #EEE;
            padding-bottom: 15px;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
            overflow-y: auto;
            padding: 10px 5px;
        }

        .word-card {
            background-color: #E3F2FD;
            border: 2px solid #BBDEFB;
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            cursor: grab;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .word-card:active {
            cursor: grabbing;
        }

        .word-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .word-card.selected {
            background-color: #FFF3E0;
            border-color: var(--secondary-color);
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
        }

        .word-card.dragging {
            opacity: 0.5;
        }

        .word-card.hidden {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .word-char {
            font-size: 44px;
            font-weight: bold;
            color: #1565C0;
            line-height: 1.2;
        }

        .word-pinyin {
            color: #555;
            margin-top: 8px;
            min-height: 72px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .zhuyin-stack {
            position: relative;
            display: inline-grid;
            place-items: center;
            min-width: 36px;
            padding-right: 14px;
            color: #424242;
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
        }

        .zhuyin-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .zhuyin-symbol {
            display: block;
        }

        .zhuyin-tone {
            position: absolute;
            right: 0;
            font-weight: 900;
            line-height: 1;
        }

        .zhuyin-stack.tone-two .zhuyin-tone {
            top: 30%;
        }

        .zhuyin-stack.tone-three .zhuyin-tone {
            top: 42%;
        }

        .zhuyin-stack.tone-neutral .zhuyin-tone {
            top: -5px;
            right: 2px;
        }

        /* 過關畫面 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s;
        }

        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .modal-title {
            color: var(--secondary-color);
            font-size: 32px;
            margin-bottom: 15px;
        }

        .modal-text {
            font-size: 20px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-restart {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        .btn-restart:hover {
            transform: scale(1.05);
            background-color: #43A047;
        }

        /* 動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 響應式設計：平板與手機 */
        @media (max-width: 800px) {
            .main-container {
                flex-direction: column-reverse;
                padding: 10px;
            }

            .words-area {
                height: auto;
                position: static;
                padding: 15px;
            }

            .words-grid {
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 10px;
                scroll-behavior: smooth;
                /* 隱藏捲軸但可捲動 */
                -ms-overflow-style: none;  
                scrollbar-width: none;  
            }
            .words-grid::-webkit-scrollbar { 
                display: none; 
            }

            .word-card {
                flex: 0 0 80px; /* 固定寬度，不換行 */
            }

            .sentence-content {
                font-size: 20px;
            }

            .drop-zone {
                width: 50px;
                height: 50px;
            }

            .word-char {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <a class="map-back-btn" href="../大冒險地圖/index.html">← 回到大地圖</a>

    <header>
        <h1>📚 同音異字小挑戰</h1>
        <div class="stats">
            <div>進度：<span id="score-display">0</span> / 12</div>
            <div>嘗試次數：<span id="attempts-display">0</span></div>
        </div>
    </header>

    <div class="main-container">
        <!-- 左側：句子區 -->
        <div class="sentences-area" id="sentences-container">
            <!-- 句子卡片會由 JavaScript 動態生成 -->
        </div>

        <!-- 右側：字卡區 -->
        <div class="words-area">
            <h2>💡 請選擇正確的字</h2>
            <div style="font-size: 14px; color: #666; text-align: center; margin-bottom: 10px;">
                (可以拖曳，也可以先點字再點空格喔！)
            </div>
            <div class="words-grid" id="words-container">
                <!-- 字卡會由 JavaScript 動態生成 -->
            </div>
        </div>
    </div>

    <!-- 過關畫面 -->
    <div class="modal-overlay" id="success-modal">
        <div class="modal-content">
            <div class="modal-icon">🎉 🌟 🎊</div>
            <div class="modal-title">恭喜你完成挑戰！</div>
            <div class="modal-text">
                你能根據句子的意思選出正確的字，太棒了！<br><br>
                總共嘗試了 <span id="final-attempts" style="color: var(--secondary-color); font-weight: bold; font-size: 24px;">0</span> 次。
            </div>
            <button class="btn-restart" onclick="initGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // ═══ 題目資料 ═══
        const sentencesData = [
            { id: "s1", answer_id: "zai1", text_before: "1. 我今天", text_after: "學校上課。", hint: "提示：表示地點", icon: "🏫" },
            { id: "s2", answer_id: "zai2", text_before: "2. 請你", text_after: "說一次。", hint: "提示：表示又一次", icon: "🗣️" },
            { id: "s3", answer_id: "zuo1", text_before: "3. 我會自己", text_after: "功課。", hint: "提示：表示完成事情", icon: "✏️" },
            { id: "s4", answer_id: "zuo2", text_before: "4. 請你", text_after: "在椅子上。", hint: "提示：表示身體坐下", icon: "🪑" },
            { id: "s5", answer_id: "jin1", text_before: "5. 學校離我家很", text_after: "。", hint: "提示：表示距離不遠", icon: "🚶" },
            { id: "s6", answer_id: "jin2", text_before: "6. 請排隊走", text_after: "教室。", hint: "提示：表示到裡面去", icon: "🚪" },
            { id: "s7", answer_id: "qing1", text_before: "7. 這條小河很", text_after: "澈。", hint: "提示：表示乾淨、透明", icon: "💧" },
            { id: "s8", answer_id: "qing2", text_before: "8. 草地是", text_after: "色的。", hint: "提示：表示綠綠的顏色", icon: "🌱" },
            { id: "s9", answer_id: "xiang1", text_before: "9. 妹妹長得很", text_after: "媽媽。", hint: "提示：表示相似", icon: "👩‍👧" },
            { id: "s10", answer_id: "xiang2", text_before: "10. 請大家看", text_after: "黑板。", hint: "提示：表示方向", icon: "👀" },
            { id: "s11", answer_id: "wan1", text_before: "11. 我把作業寫", text_after: "了。", hint: "提示：表示完成", icon: "✅" },
            { id: "s12", answer_id: "wan2", text_before: "12. 下課後，我想去操場", text_after: "。", hint: "提示：表示遊戲、活動", icon: "⚽" }
        ];

        const wordCardsData = [
            { id: "zai1", text: "在", sound: "ㄗㄞˋ", group: "zai" },
            { id: "zai2", text: "再", sound: "ㄗㄞˋ", group: "zai" },
            { id: "zuo1", text: "做", sound: "ㄗㄨㄛˋ", group: "zuo" },
            { id: "zuo2", text: "坐", sound: "ㄗㄨㄛˋ", group: "zuo" },
            { id: "jin1", text: "近", sound: "ㄐㄧㄣˋ", group: "jin" },
            { id: "jin2", text: "進", sound: "ㄐㄧㄣˋ", group: "jin" },
            { id: "qing1", text: "清", sound: "ㄑㄧㄥ", group: "qing" },
            { id: "qing2", text: "青", sound: "ㄑㄧㄥ", group: "qing" },
            { id: "xiang1", text: "像", sound: "ㄒㄧㄤˋ", group: "xiang" },
            { id: "xiang2", text: "向", sound: "ㄒㄧㄤˋ", group: "xiang" },
            { id: "wan1", text: "完", sound: "ㄨㄢˊ", group: "wan" },
            { id: "wan2", text: "玩", sound: "ㄨㄢˊ", group: "wan" }
        ];

        // ═══ 遊戲狀態 ═══
        let completedCount = 0;
        let attemptsCount = 0;
        let selectedWordId = null; // 記錄目前被點選的字卡 (點選模式)

        // ═══ 初始化與渲染 ═══
        function initGame() {
            completedCount = 0;
            attemptsCount = 0;
            selectedWordId = null;
            updateStats();
            document.getElementById('success-modal').classList.remove('show');
            
            renderSentences();
            renderWordCards();
        }

        // 打亂陣列順序 (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function renderZhuyin(zhuyin) {
            const toneMarks = ['ˊ', 'ˇ', 'ˋ', '˙'];
            const chars = Array.from(zhuyin);
            const tone = chars.find(ch => toneMarks.includes(ch)) || '';
            const symbols = chars.filter(ch => !toneMarks.includes(ch));
            const toneClass = tone === '˙'
                ? 'tone-neutral'
                : (symbols.length >= 3 ? 'tone-three' : 'tone-two');
            const symbolsHtml = symbols.map(symbol => `<span class="zhuyin-symbol">${symbol}</span>`).join('');
            const toneHtml = tone ? `<span class="zhuyin-tone">${tone}</span>` : '';

            return `
                <span class="zhuyin-stack ${toneClass}" aria-label="${zhuyin}">
                    <span class="zhuyin-body">${symbolsHtml}</span>
                    ${toneHtml}
                </span>
            `;
        }

        function renderSentences() {
            const container = document.getElementById('sentences-container');
            container.innerHTML = '';

            sentencesData.forEach(sentence => {
                const card = document.createElement('div');
                card.className = 'sentence-card';
                card.innerHTML = `
                    <div class="sentence-content">
                        <span class="sentence-icon">${sentence.icon}</span>
                        <span>${sentence.text_before}</span>
                        <div class="drop-zone" id="drop-${sentence.id}" data-answer="${sentence.answer_id}"></div>
                        <span>${sentence.text_after}</span>
                    </div>
                    <div class="sentence-hint">${sentence.hint}</div>
                    <div class="sentence-feedback" id="feedback-${sentence.id}"></div>
                `;
                container.appendChild(card);

                // 設定拖放與點擊事件
                const dropZone = card.querySelector('.drop-zone');
                
                // 拖放事件
                dropZone.addEventListener('dragover', handleDragOver);
                dropZone.addEventListener('dragleave', handleDragLeave);
                dropZone.addEventListener('drop', handleDrop);

                // 點擊事件 (點擊模式)
                dropZone.addEventListener('click', () => handleZoneClick(sentence.id, sentence.answer_id, dropZone));
            });
        }

        function renderWordCards() {
            const container = document.getElementById('words-container');
            container.innerHTML = '';

            const shuffledWords = shuffleArray(wordCardsData);

            shuffledWords.forEach(word => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.draggable = true;
                card.id = `word-${word.id}`;
                card.dataset.id = word.id;
                card.innerHTML = `
                    <div class="word-char">${word.text}</div>
                    <div class="word-pinyin">${renderZhuyin(word.sound)}</div>
                `;
                
                // 拖放事件
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);

                // 點擊事件 (點擊模式)
                card.addEventListener('click', () => handleWordClick(word.id));

                container.appendChild(card);
            });
        }

        // ═══ 拖曳模式邏輯 ═══
        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.dataset.id);
            setTimeout(() => e.target.classList.add('dragging'), 0);
            
            // 清除點選模式的選取
            if (selectedWordId) {
                document.getElementById(`word-${selectedWordId}`).classList.remove('selected');
                selectedWordId = null;
            }
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function handleDragOver(e) {
            e.preventDefault(); // 必須有，才允許 drop
            if (!e.target.classList.contains('filled')) {
                e.target.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            e.target.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            const dropZone = e.target.closest('.drop-zone');
            if (!dropZone || dropZone.classList.contains('filled')) return;

            dropZone.classList.remove('drag-over');
            
            const draggedWordId = e.dataTransfer.getData('text/plain');
            const targetSentenceId = dropZone.id.replace('drop-', '');
            const correctAnswerId = dropZone.dataset.answer;

            checkAnswer(targetSentenceId, draggedWordId, correctAnswerId, dropZone);
        }

        // ═══ 點選模式邏輯 ═══
        function handleWordClick(wordId) {
            // 如果點選同一個，就取消選取
            if (selectedWordId === wordId) {
                document.getElementById(`word-${wordId}`).classList.remove('selected');
                selectedWordId = null;
                return;
            }

            // 清除之前的選取
            if (selectedWordId) {
                const prev = document.getElementById(`word-${selectedWordId}`);
                if (prev) prev.classList.remove('selected');
            }

            // 設定新的選取
            selectedWordId = wordId;
            document.getElementById(`word-${wordId}`).classList.add('selected');
        }

        function handleZoneClick(sentenceId, correctAnswerId, dropZone) {
            if (dropZone.classList.contains('filled')) return;

            // 如果有選取字卡，就進行配對
            if (selectedWordId) {
                checkAnswer(sentenceId, selectedWordId, correctAnswerId, dropZone);
                
                // 無論對錯，都取消選取狀態
                const card = document.getElementById(`word-${selectedWordId}`);
                if(card) card.classList.remove('selected');
                selectedWordId = null;
            } else {
                // 提示先選字
                const feedback = document.getElementById(`feedback-${sentenceId}`);
                feedback.textContent = "請先從右邊點選一個字卡喔！";
                feedback.className = 'sentence-feedback feedback-error';
                setTimeout(() => { if (feedback.textContent.includes("請先")) feedback.textContent = ""; }, 2000);
            }
        }

        // ═══ 判斷與回饋邏輯 ═══
        function checkAnswer(sentenceId, wordId, correctAnswerId, dropZone) {
            attemptsCount++;
            
            const feedback = document.getElementById(`feedback-${sentenceId}`);
            const wordData = wordCardsData.find(w => w.id === wordId);

            if (!wordData) return;

            if (wordId === correctAnswerId) {
                // 答對了
                dropZone.classList.add('filled');
                dropZone.textContent = wordData.text;
                
                // 隱藏右側字卡
                document.getElementById(`word-${wordId}`).classList.add('hidden');
                
                feedback.textContent = "✔ 答對了！太棒了！";
                feedback.className = 'sentence-feedback feedback-success';
                
                completedCount++;
                updateStats();

                if (completedCount === sentencesData.length) {
                    showSuccessModal();
                }
            } else {
                // 答錯了
                dropZone.classList.add('error-flash');
                setTimeout(() => dropZone.classList.remove('error-flash'), 400);

                // 如果是點擊模式，字卡也閃一下
                const wordCard = document.getElementById(`word-${wordId}`);
                if (wordCard) {
                    wordCard.style.animation = 'shake 0.4s ease-in-out';
                    wordCard.style.borderColor = 'var(--error-color)';
                    setTimeout(() => {
                        wordCard.style.animation = '';
                        wordCard.style.borderColor = '';
                    }, 400);
                }

                feedback.textContent = "❌ 喔喔，不對喔，請看提示再想一想！";
                feedback.className = 'sentence-feedback feedback-error';
            }
        }

        function updateStats() {
            document.getElementById('score-display').textContent = completedCount;
            document.getElementById('attempts-display').textContent = attemptsCount;
        }

        function showSuccessModal() {
            localStorage.setItem('cert_homophone', 'true');
            document.getElementById('final-attempts').textContent = attemptsCount;
            // 延遲一點點顯示，讓最後一題的綠勾勾先出來
            setTimeout(() => {
                document.getElementById('success-modal').classList.add('show');
                createConfetti();
            }, 500);
        }

        // 簡單的慶祝彩帶效果
        function createConfetti() {
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#4CAF50'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.zIndex = '1000';
                confetti.style.pointerEvents = 'none';
                
                // 隨機動畫參數
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                
                confetti.animate([
                    { transform: `translate3d(0, 0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*100 - 50}px, 100vh, 0) rotate(${Math.random()*360 + 360}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });
                
                document.body.appendChild(confetti);
                
                // 清理 DOM
                setTimeout(() => confetti.remove(), (duration + delay) * 1000);
            }
        }

        // 啟動遊戲
        window.onload = initGame;
    </script>
</body>
</html>
