<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四字詞填空遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff8e1;
            --primary: #ff9800;
            --secondary: #4caf50;
            --text-main: #3e2723;
            --card-bg: #ffffff;
            --board-bg: #f1f8e9;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .map-back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            padding: 10px 18px;
            border-radius: 999px;
            background: #ffffff;
            color: #ef6c00;
            border: 3px solid #ffb74d;
            box-shadow: 0 4px 0 #ffcc80;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
        }

        .game-board {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            border: 5px solid #ffcc80;
            box-sizing: border-box;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #ef6c00;
            font-size: 36px;
            margin: 0 0 15px 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 20px;
            font-weight: bold;
            background: #fff3e0;
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid #ffe0b2;
            flex-wrap: wrap;
        }

        .progress-text {
            font-size: 24px;
            color: #0277bd;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .phrase-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 30px 0;
            gap: 15px;
            padding: 40px 20px 20px 20px;
            background: var(--board-bg);
            border-radius: 20px;
            border: 4px solid #c5e1a5;
            position: relative;
            min-height: 180px;
        }

        .phrase-icon {
            font-size: 50px;
            position: absolute;
            top: -30px;
            left: 30px;
            background: white;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #c5e1a5;
        }

        .hint-box {
            text-align: center;
            font-size: 22px;
            color: #424242;
            margin-bottom: 20px;
            background: #e3f2fd;
            padding: 15px;
            border-radius: 12px;
            border: 3px dashed #90caf9;
            font-weight: bold;
        }
        
        .sentence-box {
            text-align: center;
            font-size: 20px;
            color: #555;
            margin-bottom: 20px;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            padding: 20px;
            background: #fff3e0;
            border-radius: 15px;
            border: 2px solid #ffe0b2;
            min-height: 150px;
        }

        .card {
            background: var(--card-bg);
            border: 3px solid #ffb74d;
            border-radius: 12px;
            padding: 10px 15px;
            cursor: grab;
            box-shadow: 0 5px 0 #ffb74d;
            transition: transform 0.1s;
            user-select: none;
            touch-action: none; /* 防止觸控滑動網頁 */
        }

        .card * {
            pointer-events: none;
        }

        .card:active {
            box-shadow: 0 0 0 #ffb74d;
            transform: translateY(5px);
        }

        .card.dragging {
            opacity: 0.5;
        }

        .ghost-card {
            background: var(--card-bg);
            border: 3px solid #ffb74d;
            border-radius: 12px;
            padding: 10px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 9999;
            opacity: 0.9;
            box-sizing: border-box;
        }

        /* 注音與文字排版 */
        .word-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin: 0 5px;
        }

        .zhuyin-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 80px;
            margin-bottom: 5px;
        }

        .symbols-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: #5d4037;
        }

        .symbols span {
            display: block;
            line-height: 1.1;
        }

        .tone {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
        }

        .tone-normal {
            right: -16px;
            top: 50%;
            transform: translateY(-50%);
        }

        .tone-neutral {
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tone-none {
            display: none;
        }

        .bottom-part {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hanzi {
            font-size: 50px;
            font-weight: bold;
            color: #3e2723;
        }

        .phrase-container .hanzi {
            font-size: 64px;
        }

        .phrase-container .correct-text {
            color: #2e7d32;
            animation: popIn 0.4s cubic-bezier(.17,.89,.32,1.28);
        }

        .drop-zone {
            width: 70px;
            height: 70px;
            border: 4px dashed #90a4ae;
            border-radius: 12px;
            background: #ffffff;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .drop-zone.drag-over {
            background: #e8f5e9;
            border-color: #4caf50;
            transform: scale(1.05);
        }

        .drop-zone.flash-red {
            background: #ffebee;
            border-color: #ef5350;
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .feedback-area {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            margin-top: 10px;
        }

        .next-btn {
            padding: 12px 35px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #4caf50;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #388e3c;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: inherit;
        }

        .next-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #388e3c;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            top: 50px;
        }

        #toast.success { background: #4caf50; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4); }
        #toast.error { background: #ef5350; box-shadow: 0 4px 15px rgba(239, 83, 80, 0.4); }

        #win-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 248, 225, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #win-screen h2 {
            font-size: 56px;
            color: #ff9800;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #fff;
        }

        #win-screen p {
            font-size: 32px;
            color: #3e2723;
            margin: 10px 0;
            font-weight: bold;
        }

        .btn-restart {
            margin-top: 40px;
            padding: 15px 45px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            background: #ff9800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #f57c00;
            font-family: inherit;
        }

        .btn-restart:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #f57c00;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .phrase-container .hanzi { font-size: 48px; }
            .phrase-container .drop-zone { width: 55px; height: 55px; }
            .bottom-part { height: 60px; }
            .card .hanzi { font-size: 40px; }
            .stats-bar { font-size: 16px; padding: 10px; flex-direction: column; gap: 5px; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <a class="map-back-btn" href="../大冒險地圖/index.html">← 回到大地圖</a>

    <div id="toast"></div>

    <div class="game-board">
        <div class="header">
            <h1>四字詞填空遊戲 🎒</h1>
            <div class="stats-bar">
                <span style="color:#1976d2;">分數: <span id="score">0</span></span>
                <span style="color:#ff9800;">總嘗試次數: <span id="attempts">0</span></span>
                <button onclick="restartGame()" style="padding: 6px 15px; border-radius: 20px; border: none; background: #64b5f6; color: white; font-weight: bold; cursor: pointer; font-family: inherit;">重新開始</button>
            </div>
        </div>

        <div class="progress-text" id="progress-text">第 1 題 / 共 5 題</div>

        <div class="hint-box" id="hint-box">提示會在這裡</div>
        <div class="sentence-box" id="sentence-box">例句會在這裡</div>

        <div class="phrase-container" id="phrase-container">
            <!-- 題目區域由 JS 產生 -->
        </div>

        <div class="feedback-area">
            <button id="next-btn" class="next-btn hidden" onclick="nextQuestion()">下一題 ➡️</button>
        </div>

        <div class="cards-container" id="cards-container">
            <!-- 字卡區域由 JS 產生 -->
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <h2>太棒了！✨</h2>
        <p>你完成四字詞填空！</p>
        <p>最終分數：<span id="final-score" style="color:#1976d2;">0</span></p>
        <p>總嘗試次數：<span id="final-attempts" style="color:#ff9800;">0</span></p>
        <p>答對題數：5 / 5</p>
        <button class="btn-restart" onclick="restartGame()">重新挑戰</button>
    </div>

    <script>
        const QUESTIONS = [
            {
                phrase: "快快樂樂", blanks: [2], answers: ["樂"],
                zhuyin: [
                    { symbols: ["ㄎ", "ㄨ", "ㄞ"], tone: "ˋ" },
                    { symbols: ["ㄎ", "ㄨ", "ㄞ"], tone: "ˋ" },
                    { symbols: ["ㄌ", "ㄜ"], tone: "ˋ" },
                    { symbols: ["ㄌ", "ㄜ"], tone: "ˋ" }
                ],
                hint: "心情很好，很開心。", sentence: "小朋友快快樂樂地上學。", icon: "😊"
            },
            {
                phrase: "高高興興", blanks: [2], answers: ["興"],
                zhuyin: [
                    { symbols: ["ㄍ", "ㄠ"], tone: "" },
                    { symbols: ["ㄍ", "ㄠ"], tone: "" },
                    { symbols: ["ㄒ", "ㄧ", "ㄥ"], tone: "ˋ" },
                    { symbols: ["ㄒ", "ㄧ", "ㄥ"], tone: "ˋ" }
                ],
                hint: "心裡很開心。", sentence: "我高高興興地回家。", icon: "🎒"
            },
            {
                phrase: "乾乾淨淨", blanks: [2], answers: ["淨"],
                zhuyin: [
                    { symbols: ["ㄍ", "ㄢ"], tone: "" },
                    { symbols: ["ㄍ", "ㄢ"], tone: "" },
                    { symbols: ["ㄐ", "ㄧ", "ㄥ"], tone: "ˋ" },
                    { symbols: ["ㄐ", "ㄧ", "ㄥ"], tone: "ˋ" }
                ],
                hint: "很乾淨，沒有髒東西。", sentence: "教室變得乾乾淨淨。", icon: "🧹"
            },
            {
                phrase: "安安靜靜", blanks: [2], answers: ["靜"],
                zhuyin: [
                    { symbols: ["ㄢ"], tone: "" },
                    { symbols: ["ㄢ"], tone: "" },
                    { symbols: ["ㄐ", "ㄧ", "ㄥ"], tone: "ˋ" },
                    { symbols: ["ㄐ", "ㄧ", "ㄥ"], tone: "ˋ" }
                ],
                hint: "很安靜，沒有吵鬧。", sentence: "大家安安靜靜地看書。", icon: "📖"
            },
            {
                phrase: "整整齊齊", blanks: [2], answers: ["齊"],
                zhuyin: [
                    { symbols: ["ㄓ", "ㄥ"], tone: "ˇ" },
                    { symbols: ["ㄓ", "ㄥ"], tone: "ˇ" },
                    { symbols: ["ㄑ", "ㄧ"], tone: "ˊ" },
                    { symbols: ["ㄑ", "ㄧ"], tone: "ˊ" }
                ],
                hint: "東西排得很好，不亂。", sentence: "書本排得整整齊齊。", icon: "📚"
            },
            {
                phrase: "認認真真", blanks: [2], answers: ["真"],
                zhuyin: [
                    { symbols: ["ㄖ", "ㄣ"], tone: "ˋ" },
                    { symbols: ["ㄖ", "ㄣ"], tone: "ˋ" },
                    { symbols: ["ㄓ", "ㄣ"], tone: "" },
                    { symbols: ["ㄓ", "ㄣ"], tone: "" }
                ],
                hint: "做事情很用心。", sentence: "他認認真真地寫字。", icon: "✏️"
            },
            {
                phrase: "平平安安", blanks: [2], answers: ["安"],
                zhuyin: [
                    { symbols: ["ㄆ", "ㄧ", "ㄥ"], tone: "ˊ" },
                    { symbols: ["ㄆ", "ㄧ", "ㄥ"], tone: "ˊ" },
                    { symbols: ["ㄢ"], tone: "" },
                    { symbols: ["ㄢ"], tone: "" }
                ],
                hint: "安全、沒有危險。", sentence: "大家平平安安地回家。", icon: "🏠"
            },
            {
                phrase: "開開心心", blanks: [2], answers: ["心"],
                zhuyin: [
                    { symbols: ["ㄎ", "ㄞ"], tone: "" },
                    { symbols: ["ㄎ", "ㄞ"], tone: "" },
                    { symbols: ["ㄒ", "ㄧ", "ㄣ"], tone: "" },
                    { symbols: ["ㄒ", "ㄧ", "ㄣ"], tone: "" }
                ],
                hint: "很開心、很快樂。", sentence: "我們開開心心地玩遊戲。", icon: "🎲"
            },
            {
                phrase: "大大小小", blanks: [2], answers: ["小"],
                zhuyin: [
                    { symbols: ["ㄉ", "ㄚ"], tone: "ˋ" },
                    { symbols: ["ㄉ", "ㄚ"], tone: "ˋ" },
                    { symbols: ["ㄒ", "ㄧ", "ㄠ"], tone: "ˇ" },
                    { symbols: ["ㄒ", "ㄧ", "ㄠ"], tone: "ˇ" }
                ],
                hint: "有大的，也有小的。", sentence: "桌上有大大小小的盒子。", icon: "📦"
            },
            {
                phrase: "說說笑笑", blanks: [2], answers: ["笑"],
                zhuyin: [
                    { symbols: ["ㄕ", "ㄨ", "ㄛ"], tone: "" },
                    { symbols: ["ㄕ", "ㄨ", "ㄛ"], tone: "" },
                    { symbols: ["ㄒ", "ㄧ", "ㄠ"], tone: "ˋ" },
                    { symbols: ["ㄒ", "ㄧ", "ㄠ"], tone: "ˋ" }
                ],
                hint: "一邊說話，一邊笑，很開心的樣子。", sentence: "小朋友說說笑笑地走進教室。", icon: "😄"
            },
            {
                phrase: "來來往往", blanks: [2], answers: ["往"],
                zhuyin: [
                    { symbols: ["ㄌ", "ㄞ"], tone: "ˊ" },
                    { symbols: ["ㄌ", "ㄞ"], tone: "ˊ" },
                    { symbols: ["ㄨ", "ㄤ"], tone: "ˇ" },
                    { symbols: ["ㄨ", "ㄤ"], tone: "ˇ" }
                ],
                hint: "很多人走來走去。", sentence: "校門口有很多人來來往往。", icon: "🚶"
            },
            {
                phrase: "仔仔細細", blanks: [2], answers: ["細"],
                zhuyin: [
                    { symbols: ["ㄗ"], tone: "ˇ" },
                    { symbols: ["ㄗ"], tone: "ˇ" },
                    { symbols: ["ㄒ", "ㄧ"], tone: "ˋ" },
                    { symbols: ["ㄒ", "ㄧ"], tone: "ˋ" }
                ],
                hint: "做事情很小心、很認真。", sentence: "我仔仔細細地檢查功課。", icon: "🔍"
            }
        ];

        const DISTRACTORS_DICT = {
            "樂": { symbols: ["ㄌ", "ㄜ"], tone: "ˋ" },
            "興": { symbols: ["ㄒ", "ㄧ", "ㄥ"], tone: "ˋ" },
            "淨": { symbols: ["ㄐ", "ㄧ", "ㄥ"], tone: "ˋ" },
            "靜": { symbols: ["ㄐ", "ㄧ", "ㄥ"], tone: "ˋ" },
            "齊": { symbols: ["ㄑ", "ㄧ"], tone: "ˊ" },
            "真": { symbols: ["ㄓ", "ㄣ"], tone: "" },
            "安": { symbols: ["ㄢ"], tone: "" },
            "心": { symbols: ["ㄒ", "ㄧ", "ㄣ"], tone: "" },
            "小": { symbols: ["ㄒ", "ㄧ", "ㄠ"], tone: "ˇ" },
            "笑": { symbols: ["ㄒ", "ㄧ", "ㄠ"], tone: "ˋ" },
            "往": { symbols: ["ㄨ", "ㄤ"], tone: "ˇ" },
            "細": { symbols: ["ㄒ", "ㄧ"], tone: "ˋ" },
            "大": { symbols: ["ㄉ", "ㄚ"], tone: "ˋ" },
            "上": { symbols: ["ㄕ", "ㄤ"], tone: "ˋ" },
            "左": { symbols: ["ㄗ", "ㄨ", "ㄛ"], tone: "ˇ" },
            "多": { symbols: ["ㄉ", "ㄨ", "ㄛ"], tone: "" },
            "好": { symbols: ["ㄏ", "ㄠ"], tone: "ˇ" },
            "書": { symbols: ["ㄕ", "ㄨ"], tone: "" },
            "人": { symbols: ["ㄖ", "ㄣ"], tone: "ˊ" },
            "花": { symbols: ["ㄏ", "ㄨ", "ㄚ"], tone: "" },
            "水": { symbols: ["ㄕ", "ㄨ", "ㄟ"], tone: "ˇ" },
            "手": { symbols: ["ㄕ", "ㄡ"], tone: "ˇ" },
            "口": { symbols: ["ㄎ", "ㄡ"], tone: "ˇ" },
            "天": { symbols: ["ㄊ", "ㄧ", "ㄢ"], tone: "" }
        };

        let gameQuestions = [];
        let currentQIndex = 0;
        let score = 0;
        let attempts = 0;
        let isQuestionAnswered = false;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'ding') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'buzz') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.2);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function renderWordUnit(char, zhuyinObj, isBlank, answerChar = '') {
            let toneClass = 'tone-normal';
            let toneSymbol = zhuyinObj.tone;
            if (zhuyinObj.tone === '˙') toneClass = 'tone-neutral';
            else if (!zhuyinObj.tone) { toneClass = 'tone-none'; toneSymbol = ''; }

            let symbolsHtml = zhuyinObj.symbols.map(s => `<span>${s}</span>`).join('');
            
            let bottomHtml = isBlank 
                ? `<div class="drop-zone" data-answer="${answerChar}"></div>` 
                : `<div class="hanzi">${char}</div>`;

            return `
                <div class="word-unit">
                    <div class="zhuyin-column">
                        <div class="symbols-container">
                            <div class="tone ${toneClass}">${toneSymbol}</div>
                            <div class="symbols">${symbolsHtml}</div>
                        </div>
                    </div>
                    <div class="bottom-part">
                        ${bottomHtml}
                    </div>
                </div>
            `;
        }

        function restartGame() {
            score = 0;
            attempts = 0;
            updateStats();
            document.getElementById('win-screen').classList.add('hidden');
            
            // Randomly select 5 questions
            gameQuestions = shuffle(QUESTIONS).slice(0, 5);
            currentQIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            isQuestionAnswered = false;
            document.getElementById('next-btn').classList.add('hidden');
            
            const q = gameQuestions[currentQIndex];
            document.getElementById('progress-text').textContent = `第 ${currentQIndex + 1} 題 / 共 5 題`;
            document.getElementById('hint-box').textContent = `💡 提示：${q.hint}`;
            document.getElementById('sentence-box').textContent = `📖 例句：${q.sentence}`;

            const phraseContainer = document.getElementById('phrase-container');
            phraseContainer.innerHTML = `<div class="phrase-icon">${q.icon}</div>`;
            
            // Render phrase
            for (let i = 0; i < 4; i++) {
                const char = q.phrase[i];
                const zhuyin = q.zhuyin[i];
                const isBlank = q.blanks.includes(i);
                const answerChar = isBlank ? q.answers[q.blanks.indexOf(i)] : '';
                phraseContainer.innerHTML += renderWordUnit(char, zhuyin, isBlank, answerChar);
            }

            // Setup Drop Zone Desktop Events
            const dropZone = document.querySelector('.drop-zone');
            if (dropZone) {
                dropZone.addEventListener('dragover', e => {
                    e.preventDefault();
                    dropZone.classList.add('drag-over');
                });
                dropZone.addEventListener('dragleave', e => {
                    dropZone.classList.remove('drag-over');
                });
                dropZone.addEventListener('drop', e => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                    if (draggedCard) {
                        handleDrop(draggedCard, dropZone);
                    }
                });
            }

            // Prepare cards
            const answerChar = q.answers[0];
            const allDistractorKeys = Object.keys(DISTRACTORS_DICT).filter(k => k !== answerChar);
            const selectedDistractors = shuffle(allDistractorKeys).slice(0, 7);
            
            const cardsData = [
                { char: answerChar, zhuyin: q.zhuyin[q.blanks[0]] },
                ...selectedDistractors.map(k => ({ char: k, zhuyin: DISTRACTORS_DICT[k] }))
            ];
            
            const shuffledCards = shuffle(cardsData);
            
            const cardsContainer = document.getElementById('cards-container');
            cardsContainer.innerHTML = '';
            
            shuffledCards.forEach(data => {
                const card = document.createElement('div');
                card.className = 'card';
                card.draggable = true;
                card.dataset.char = data.char;
                card.innerHTML = renderWordUnit(data.char, data.zhuyin, false);
                cardsContainer.appendChild(card);
            });

            setupDragEvents();
        }

        let draggedCard = null;
        let ghostCard = null;

        function setupDragEvents() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                // Desktop
                card.addEventListener('dragstart', (e) => {
                    initAudio();
                    if (isQuestionAnswered) return;
                    draggedCard = card;
                    e.dataTransfer.setData('text/plain', card.dataset.char);
                    setTimeout(() => card.classList.add('dragging'), 0);
                });
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    draggedCard = null;
                });

                // Touch support
                card.addEventListener('touchstart', (e) => {
                    initAudio();
                    if (isQuestionAnswered) return;
                    const touch = e.touches[0];
                    draggedCard = card;
                    
                    const rect = card.getBoundingClientRect();
                    ghostCard = card.cloneNode(true);
                    ghostCard.classList.add('ghost-card');
                    ghostCard.style.width = rect.width + 'px';
                    ghostCard.style.height = rect.height + 'px';
                    document.body.appendChild(ghostCard);
                    
                    moveGhost(touch.clientX, touch.clientY, rect.width, rect.height);
                    card.classList.add('dragging');
                }, {passive: false});

                card.addEventListener('touchmove', (e) => {
                    if (!ghostCard) return;
                    e.preventDefault(); 
                    const touch = e.touches[0];
                    const rect = card.getBoundingClientRect();
                    moveGhost(touch.clientX, touch.clientY, rect.width, rect.height);
                    
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
                    if (target && target.closest('.drop-zone')) {
                        target.closest('.drop-zone').classList.add('drag-over');
                    }
                }, {passive: false});

                card.addEventListener('touchend', (e) => {
                    if (!ghostCard) return;
                    const touch = e.changedTouches[0];
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    const dropZone = target ? target.closest('.drop-zone') : null;
                    
                    ghostCard.remove();
                    ghostCard = null;
                    card.classList.remove('dragging');
                    
                    if (dropZone) {
                        handleDrop(draggedCard, dropZone);
                    }
                    
                    draggedCard = null;
                    document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
                });
            });
        }

        function moveGhost(x, y, w, h) {
            ghostCard.style.left = (x - w/2) + 'px';
            ghostCard.style.top = (y - h/2) + 'px';
        }

        function handleDrop(card, dropZone) {
            if (isQuestionAnswered) return;
            
            attempts++;
            const answer = dropZone.dataset.answer;
            const picked = card.dataset.char;

            if (answer === picked) {
                // 正確
                isQuestionAnswered = true;
                score += 10;
                updateStats();
                playSound('ding');
                showToast('答對了！⭐️', 'success');
                
                // 將格子變成文字
                const hanziDiv = document.createElement('div');
                hanziDiv.className = 'hanzi correct-text';
                hanziDiv.textContent = picked;
                dropZone.replaceWith(hanziDiv);
                
                // 隱藏該卡片
                card.style.visibility = 'hidden';
                
                document.getElementById('next-btn').classList.remove('hidden');
                
            } else {
                // 錯誤
                updateStats();
                playSound('buzz');
                showToast('再想想，看一看提示喔！', 'error');
                
                const phraseContainer = document.getElementById('phrase-container');
                phraseContainer.classList.add('shake');
                dropZone.classList.add('flash-red');
                
                setTimeout(() => {
                    phraseContainer.classList.remove('shake');
                    dropZone.classList.remove('flash-red');
                }, 400);
            }
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < 5) {
                loadQuestion();
            } else {
                showWinScreen();
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('attempts').textContent = attempts;
        }

        let toastTimeout;
        function showToast(msg, type) {
            const toastEl = document.getElementById('toast');
            toastEl.textContent = msg;
            toastEl.className = type;
            toastEl.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 1500);
        }

        function showWinScreen() {
            localStorage.setItem('cert_phrase', 'true');
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-attempts').textContent = attempts;
            document.getElementById('win-screen').classList.remove('hidden');
        }

        window.onload = restartGame;
    </script>
</body>
</html>
